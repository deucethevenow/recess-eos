# Recess OS — KPI Goal Mappings (DEPRECATED — read-only reference)
#
# ═════════════════════════════════════════════════════════════════════════
# STATUS: Deprecated 2026-04-11 (hardening refactor)
# CANONICAL SOURCE: config/recess_os.yml → `goals` section
# ═════════════════════════════════════════════════════════════════════════
#
# This file previously contained transform math (transform_target,
# transform_baseline) and threshold logic, which made it a parallel metric
# logic engine alongside the KPI Dashboard metric_registry.py. That violated
# the single-source-of-truth architecture.
#
# The hardening refactor:
#   1. Stripped ALL transform/threshold/snapshot logic from this file
#   2. Moved active goals to config/recess_os.yml `goals` section
#   3. Reduced each remaining entry to pointer-only fields (id + registry_key)
#   4. Added scripts/tests/test_kpi_config_consistency.py as the drift guard
#
# Consumers:
#   - scripts/lib/kpi_goals_pusher.py reads `goals` from recess_os.yml ONLY.
#   - This file is not read by any production code path.
#   - It is preserved in-tree solely as a historical reference so operators
#     can trace what the legacy Friday-cron pushed.
#
# Rules (enforced by test_kpi_config_consistency.py):
#   - kpi_goals.yml entries MUST NOT contain logic fields
#     (transform, transform_target, transform_baseline, thresholds,
#      snapshot_table, snapshot_column, format, higher_is_better).
#   - Every asana_goal_id in this file MUST also appear in recess_os.yml.
#   - Conflicting values for the same goal_id across files → hard failure.
#
# If you need to add a new goal: add it to recess_os.yml, NOT here.
# If you need to remove a goal: remove it from BOTH files.
# If you need to change transform logic: change the registry entry, not config.
# ─────────────────────────────────────────────────────────────────────────

kpi_goals: []

