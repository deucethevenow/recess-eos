    day: thursday
    duration_min: 120
    asana_project_id: "1203877946496228"
    asana_section_id: "1205117190014932"
    slack_channel: "C05855AJCKF"  # #leadership-team
    sensitive: true
    pre_read_format: "google_doc"
    scorecard_metrics: []  # populated in Phase 0
    members: []            # populated in Phase 0

  - id: founders
    name: "Founders Meeting (Jack + Deuce)"
    facilitator_email: "deuce@recess.is"
