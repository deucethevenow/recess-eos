# ──────────────────────────────────────────────────────────────────────
# CRON — Bi-weekly dispatch parity
# ──────────────────────────────────────────────────────────────────────
# reference_week: ISO week number that anchors the alternation pattern.
#   Week 14 (2026-03-30) was the first goals week after Phase 2 launch.
# goals_weeks: "even" or "odd" — which offset-parity weeks are goals weeks.
#   "even" means reference_week itself (offset 0) is goals, +1 is projects, etc.
cron:
  reference_week: 14
  reference_year: 2026
  goals_weeks: "even"
